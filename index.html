<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой сайт</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet"></p>
<p><style>
body {
  margin: 0;
  font-family: &lsquo;Inter&rsquo;, sans-serif;
  background: #0f172a;
  color: white;
}</p>
<p>.animate {
  opacity: 0;
  transform: translateY(40px);
  transition: all 0.8s ease;
}</p>
<p>.animate.show {
  opacity: 1;
  transform: translateY(0);
}</p>
<p>header {
  text-align: center;
  padding: 120px 20px;
}</p>
<p>.section {
  padding: 80px 20px;
  text-align: center;
}</p>
<p>.cards {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}</p>
<p>.card {
  background: #1e293b;
  padding: 25px;
  border-radius: 15px;
  width: 260px;
}</p>
<p>.button {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  background: #22c55e;
  color: white;
  text-decoration: none;
  border-radius: 10px;
}
</style>
</head></p>
<p><body></p>
<header class="animate">
<h1>Создаю современные сайты</h1>
<p>Красиво и быстро</p>
<a class="button" href="#contact">Связаться</a>
</header>
<section class="section animate">
<h2>Обо мне</h2>
<p>Делаю сайты, которые привлекают клиентов</p>
</section>
<section class="section animate">
<h2>Услуги</h2>
<div class="cards">
<div class="card">Лендинг</div>
<div class="card">Сайт-визитка</div>
<div class="card">Редизайн</div>
</div>
</section>
<section class="section animate" id="contact">
<h2>Контакты</h2>
<p>Telegram: @yourname</p>
</section>
<script>
const elements = document.querySelectorAll('.animate');
function showOnScroll() {
  elements.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 50) {
      el.classList.add('show');
    }
  });
}
window.addEventListener('scroll', showOnScroll);
window.addEventListener('load', showOnScroll);
</script>
<p></body>
</html>
