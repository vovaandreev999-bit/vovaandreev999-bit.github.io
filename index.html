<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой сайт</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: &lsquo;Inter&rsquo;, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}</p>
<p>header {
  text-align: center;
  padding: 100px 20px;
}</p>
<p>h1 {
  font-size: 48px;
  margin-bottom: 10px;
}</p>
<p>p {
  opacity: 0.8;
  max-width: 600px;
  margin: auto;
}</p>
<p>.button {
  display: inline-block;
  margin-top: 25px;
  padding: 14px 30px;
  background: linear-gradient(45deg, #22c55e, #4ade80);
  color: #022c22;
  text-decoration: none;
  border-radius: 10px;
  font-weight: 600;
  transition: 0.3s;
}</p>
<p>.button:hover {
  transform: scale(1.05);
}</p>
<p>.section {
  padding: 80px 20px;
  text-align: center;
}</p>
<p>.cards {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 40px;
}</p>
<p>.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 15px;
  width: 260px;
  transition: 0.3s;
}</p>
<p>.card:hover {
  transform: translateY(-10px);
}</p>
<p>footer {
  text-align: center;
  padding: 30px;
  opacity: 0.5;
}
</style>
</head>
<body></p>
<header>
<h1>Твой продукт или услуга</h1>
<p>Коротко и понятно объясни, чем ты полезен клиенту</p>
<a class="button" href="#contact">Связаться</a>
</header>
<section class="section">
<h2>Обо мне</h2>
<p>Расскажи, кто ты, чем занимаешься и почему тебе можно доверять</p>
</section>
<section class="section">
<h2>Услуги</h2>
<div class="cards">
<div class="card">Услуга 1</div>
<div class="card">Услуга 2</div>
<div class="card">Услуга 3</div>
</div>
</section>
<section class="section" id="contact">
<h2>Контакты</h2>
<p>Telegram / Email / Телефон</p>
</section>
<footer>
<p>© 2026 Все права защищены</p>
</footer>
<p></body>
</html>
